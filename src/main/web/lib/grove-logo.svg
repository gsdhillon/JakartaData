<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title">
    <title id="title">Grove framework logo</title>

    <defs>
        <linearGradient id="badgeGradient" x1="18" y1="12" x2="78" y2="84" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#f0f9ff"/>
            <stop offset="0.52" stop-color="#e0f2fe"/>
            <stop offset="1" stop-color="#cffafe"/>
        </linearGradient>

        <linearGradient id="themeRim" x1="15" y1="13" x2="82" y2="83" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0d6efd"/>
            <stop offset="0.48" stop-color="#138adf"/>
            <stop offset="1" stop-color="#20c997"/>
        </linearGradient>

        <linearGradient id="markGradient" x1="26" y1="22" x2="70" y2="75" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0d6efd"/>
            <stop offset="1" stop-color="#0f766e"/>
        </linearGradient>

        <linearGradient id="nodeGradient" x1="54" y1="35" x2="67" y2="50" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#20c997"/>
            <stop offset="1" stop-color="#0f766e"/>
        </linearGradient>

        <filter id="logoShadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
            <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#0f766e" flood-opacity="0.24"/>
            <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.14"/>
        </filter>
    </defs>

    <g filter="url(#logoShadow)">
        <circle cx="48" cy="48" r="44" fill="#ffffff"/>
        <circle cx="48" cy="48" r="39" fill="url(#badgeGradient)" stroke="url(#themeRim)" stroke-width="8"/>
        <path d="M48 68c-7-7-6.7-15.7 0-22.6 6.7 6.9 7 15.6 0 22.6z" fill="#0d6efd" opacity="0.22"/>
        <path d="M36.8 66.4c-1.8-9.1 2.7-16.4 11.2-20.9 2.3 9.5-1.8 17.1-11.2 20.9z" fill="#20c997" opacity="0.2"/>
        <path d="M59.2 66.4c-9.4-3.8-13.5-11.4-11.2-20.9 8.5 4.5 13 11.8 11.2 20.9z" fill="#20c997" opacity="0.2"/>
        <path d="M64.3 33.5A23 23 0 1 0 65.2 61" fill="none" stroke="#f0f9ff" stroke-linecap="round" stroke-width="13"/>
        <path d="M64.3 33.5A23 23 0 1 0 65.2 61" fill="none" stroke="url(#markGradient)" stroke-linecap="round" stroke-width="9"/>
        <path d="M49 48h22v16" fill="none" stroke="#f0f9ff" stroke-linecap="round" stroke-linejoin="round" stroke-width="13"/>
        <path d="M49 48h22v16" fill="none" stroke="url(#markGradient)" stroke-linecap="round" stroke-linejoin="round" stroke-width="9"/>
        <circle cx="64" cy="34" r="5.8" fill="url(#nodeGradient)" stroke="#f0f9ff" stroke-width="2.6"/>
        <path d="M64 28.8v10.4M58.8 34h10.4M60.3 30.3l7.4 7.4M67.7 30.3l-7.4 7.4" fill="none" stroke="#ecfeff" stroke-linecap="round" stroke-width="0.8" opacity="0.92"/>
    </g>
</svg>
