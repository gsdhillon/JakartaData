<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jakarta Data Person</title>
    <link rel="stylesheet" href="lib/bootstrap.min.css">
</head>
<body>
<main class="container py-4">
    <h1 class="mb-4">Jakarta Data Person</h1>

    <section class="card mb-4">
        <div class="card-body">
            <form id="personForm" class="row g-2 align-items-center">
                <input type="hidden" id="personId">
                <div class="col">
                    <input class="form-control" type="text" id="personName" placeholder="Person name" required>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary" type="submit" id="saveButton">Create</button>
                    <button class="btn btn-secondary" type="button" id="cancelButton" hidden>Cancel</button>
                </div>
            </form>
            <div id="message" class="form-text mt-2"></div>
        </div>
    </section>

    <section class="card">
        <div class="card-body table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="personRows">
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const apiUrl = 'api/persons';
    const form = document.getElementById('personForm');
    const personId = document.getElementById('personId');
    const personName = document.getElementById('personName');
    const saveButton = document.getElementById('saveButton');
    const cancelButton = document.getElementById('cancelButton');
    const personRows = document.getElementById('personRows');
    const message = document.getElementById('message');

    async function loadPersons() {
        const response = await fetch(apiUrl);
        const persons = await response.json();

        personRows.innerHTML = '';

        for (const person of persons) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${person.id}</td>
                <td>${person.name}</td>
                <td>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-secondary btn-sm" onclick="startEdit(${person.id}, '${escapeText(person.name)}')">Edit</button>
                        <button type="button" class="btn btn-danger btn-sm" onclick="deletePerson(${person.id})">Delete</button>
                    </div>
                </td>
            `;
            personRows.appendChild(row);
        }
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const id = personId.value;
        const person = {name: personName.value};
        const method = id ? 'PUT' : 'POST';
        const url = id ? `${apiUrl}/${id}` : apiUrl;

        const response = await fetch(url, {
            method,
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(person)
        });

        if (!response.ok) {
            showMessage('Save failed.');
            return;
        }

        resetForm();
        showMessage(id ? 'Person updated.' : 'Person created.');
        await loadPersons();
    });

    function startEdit(id, name) {
        personId.value = id;
        personName.value = name;
        saveButton.textContent = 'Update';
        cancelButton.hidden = false;
        personName.focus();
    }

    async function deletePerson(id) {
        const response = await fetch(`${apiUrl}/${id}`, {method: 'DELETE'});

        if (!response.ok) {
            showMessage('Delete failed.');
            return;
        }

        resetForm();
        showMessage('Person deleted.');
        await loadPersons();
    }

    cancelButton.addEventListener('click', resetForm);

    function resetForm() {
        form.reset();
        personId.value = '';
        saveButton.textContent = 'Create';
        cancelButton.hidden = true;
    }

    function showMessage(text) {
        message.textContent = text;
    }

    function escapeText(text) {
        return String(text).replaceAll('\\', '\\\\').replaceAll("'", "\\'");
    }

    loadPersons().catch(() => showMessage('Could not load persons.'));
</script>
</body>
</html>
